<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Admin Panel - Maurya Enterprises</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f6f9; margin: 0; padding: 20px; }
        .hidden { display: none !important; }
        
        /* लॉगिन बॉक्स स्टाइल */
        .login-container { max-width: 400px; margin: 100px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        .login-container h2 { margin-bottom: 20px; color: #333; }
        .login-container input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        .login-btn { background: #ff9900; color: black; font-weight: bold; border: none; padding: 12px; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; }
        .login-btn:hover { background: #e08800; }

        /* मुख्य एडमिन पैनल स्टाइल */
        .admin-container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2, h3 { color: #333; margin-top: 0; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: #fafafa; padding: 20px; border-radius: 6px; border: 1px solid #eee; margin-bottom: 30px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-weight: 600; margin-bottom: 5px; font-size: 14px; color: #444; }
        .form-group input { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        .submit-btn { background: #ff9900; color: black; font-weight: bold; border: none; padding: 12px; border-radius: 4px; cursor: pointer; font-size: 16px; width: 100%; margin-top: 10px; }
        .submit-btn:hover { background: #e08800; }
        .cancel-btn { background: #666; color: white; font-weight: bold; border: none; padding: 12px; border-radius: 4px; cursor: pointer; font-size: 16px; width: 100%; margin-top: 5px; display: none; }
        .logout-btn { background: #6c757d; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; float: right; }
        
        /* Hierarchy & Grid Styles */
        .breadcrumb { margin-bottom: 20px; padding: 12px; background: #e9ecef; border-radius: 4px; font-weight: 600; font-size: 15px; }
        .breadcrumb a { color: #007bff; text-decoration: none; cursor: pointer; }
        .breadcrumb span { color: #6c757d; }
        .grid-view { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 15px; }
        .card-item { background: #fff; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: 0.2s; display: flex; flex-direction: column; }
        .card-item:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .card-img { width: 100%; height: 160px; object-fit: cover; background: #eee; }
        .card-content { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .card-title { font-size: 16px; font-weight: 600; margin: 0 0 10px 0; color: #333; }
        .action-btns { display: flex; gap: 5px; width: 100%; }
        .btn-sm { flex: 1; padding: 6px 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; text-align: center; }
        .btn-edit { background: #007bff; color: white; }
        .btn-delete { background: #dc3545; color: white; }
        .product-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .product-table th, .product-table td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        .product-table th { background: #333; color: white; }
        .back-home { margin-bottom: 20px; display: inline-block; color: #ff9900; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <!-- 1. लॉगिन स्क्रीन -->
    <div id="login-screen" class="login-container">
        <h2><i class="fas fa-lock"></i> Admin Login</h2>
        <form id="login-form">
            <input type="email" id="login-email" placeholder="Admin Email" required>
            <input type="password" id="login-password" placeholder="Password" required>
            <button type="submit" class="login-btn">Login</button>
        </form>
    </div>

    <!-- 2. मुख्य एडमिन पैनल (शुरू में छुपा रहेगा) -->
    <div id="admin-panel" class="admin-container hidden">
        <button class="logout-btn" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
        <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Back to Live Website</a>
        <h2><i class="fas fa-user-shield"></i> Maurya Enterprises - Secure Catalog Manager</h2>
        <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 25px;">

        <!-- मुख्य प्रोडक्ट फॉर्म -->
        <h3 id="form-title">Add New Product & Category Structure</h3>
        <form id="admin-product-form">
            <input type="hidden" id="edit-prod-id">
            <div class="form-grid">
                <div class="form-group">
                    <label>Category Name</label>
                    <input type="text" id="prod-category" placeholder="e.g., Plywood & Boards" required>
                </div>
                <div class="form-group">
                    <label>Category Image URL</label>
                    <input type="url" id="cat-img" placeholder="Paste Category Photo Link">
                </div>
                <div class="form-group">
                    <label>Subcategory Name</label>
                    <input type="text" id="prod-subcat" placeholder="e.g., Commercial Plywood" required>
                </div>
                <div class="form-group">
                    <label>Subcategory Image URL</label>
                    <input type="url" id="subcat-img" placeholder="Paste Sub-category Photo Link">
                </div>
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="prod-name" placeholder="e.g., Action Tesa 19mm Board" required>
                </div>
                <div class="form-group">
                    <label>Price (₹)</label>
                    <input type="number" id="prod-price" placeholder="e.g., 1850" required>
                </div>
                <div class="form-group">
                    <label>Length / Width</label>
                    <input type="text" id="prod-length" placeholder="e.g., 8 ft">
                </div>
                <div class="form-group">
                    <label>Height / Thickness</label>
                    <input type="text" id="prod-height" placeholder="e.g., 19mm">
                </div>
                <div class="form-group">
                    <label>Available Quantity (Stock)</label>
                    <input type="number" id="prod-qty" placeholder="e.g., 120" required>
                </div>
                <div class="form-group">
                    <label>Product Image URL</label>
                    <input type="url" id="prod-img" placeholder="Paste Product Photo Link">
                </div>
            </div>
            <button type="submit" id="save-btn" class="submit-btn"><i class="fas fa-plus"></i> Save to Database</button>
            <button type="button" id="cancel-edit-btn" class="cancel-btn" onclick="resetForm()">Cancel Edit</button>
        </form>

        <div class="breadcrumb" id="admin-breadcrumb">
            <a onclick="navigateTo('categories')">Root / Categories</a>
        </div>

        <div id="view-categories" class="view-section">
            <h3><i class="fas fa-folder"></i> Live Categories</h3>
            <div class="grid-view" id="categories-grid"></div>
        </div>

        <div id="view-subcategories" class="view-section hidden">
            <h3><i class="fas fa-folder-open"></i> Subcategories</h3>
            <div class="grid-view" id="subcategories-grid"></div>
        </div>

        <div id="view-products" class="view-section hidden">
            <h3><i class="fas fa-boxes"></i> Target Products</h3>
            <table class="product-table">
                <thead>
                    <tr>
                        <th>Image</th>
                        <th>Product Name</th>
                        <th>Size (L x H)</th>
                        <th>Stock</th>
                        <th>Price</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="products-table-body"></tbody>
            </table>
        </div>
    </div>

    <!-- Firebase SDK Links -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyCcfJ7lqOA95b1dqlrQETvAAPooifKAy1g",
          authDomain: "mauryaenterprises-84287.firebaseapp.com",
          projectId: "mauryaenterprises-84287",
          storageBucket: "mauryaenterprises-84287.firebasestorage.app",
          messagingSenderId: "763643637248",
          appId: "1:763643637248:web:3cbfe9ea8b68bebc4132e5",
          measurementId: "G-EK8B6BRLC3"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let allProducts = [];
        let currentCategory = "";
        let currentSubcategory = "";
        let currentView = "categories"; 
        const defaultImg = "https://placehold.co/300x200?text=No+Image";

        // 🔒 लॉगिन स्टेटस चेक (Authentication Observer)
        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById("login-screen").classList.add("hidden");
                document.getElementById("admin-panel").classList.remove("hidden");
                loadAdminData();
            } else {
                document.getElementById("login-screen").classList.remove("hidden");
                document.getElementById("admin-panel").classList.add("hidden");
            }
        });

        // लॉगिन फॉर्म हैंडलर
        document.getElementById("login-form").addEventListener("submit", (e) => {
            e.preventDefault();
            const email = document.getElementById("login-email").value;
            const pass = document.getElementById("login-password").value;
            
            auth.signInWithEmailAndPassword(email, pass)
            .catch(err => alert("Error: " + err.message));
        });

        // लॉगआउट हैंडलर
        function handleLogout() {
            auth.signOut();
        }

        // डेटा लोड करना (सिर्फ लॉगिन के बाद चलेगा)
        function loadAdminData() {
            db.collection("products").onSnapshot((snapshot) => {
                allProducts = [];
                snapshot.forEach((doc) => { allProducts.push({ id: doc.id, ...doc.data() }); });
                renderCurrentView();
            });
        }

        function renderCurrentView() {
            updateBreadcrumbs();
            document.getElementById("view-categories").classList.add("hidden");
            document.getElementById("view-subcategories").classList.add("hidden");
            document.getElementById("view-products").classList.add("hidden");

            if (currentView === "categories") {
                document.getElementById("view-categories").classList.remove("hidden");
                renderCategoriesGrid();
            } else if (currentView === "subcategories") {
                document.getElementById("view-subcategories").classList.remove("hidden");
                renderSubcategoriesGrid();
            } else if (currentView === "products") {
                document.getElementById("view-products").classList.remove("hidden");
                renderProductsTable();
            }
        }

        function renderCategoriesGrid() {
            const grid = document.getElementById("categories-grid");
            grid.innerHTML = "";
            const uniqueCats = {};
            allProducts.forEach(p => { if(p.category && !uniqueCats[p.category]) uniqueCats[p.category] = p.categoryImg || defaultImg; });
            const keys = Object.keys(uniqueCats);
            if(keys.length === 0) { grid.innerHTML = "<p>No active categories yet.</p>"; return; }
            keys.forEach(catName => {
                const card = document.createElement("div");
                card.className = "card-item";
                card.onclick = () => { currentCategory = catName; currentView = "subcategories"; renderCurrentView(); };
                card.innerHTML = `
                    <img class="card-img" src="${uniqueCats[catName]}">
                    <div class="card-content">
                        <div class="card-title"><i class="fas fa-folder"></i> ${catName}</div>
                        <div class="action-btns" onclick="event.stopPropagation();">
                            <button class="btn-sm btn-edit" onclick="editCategoryDetails('${catName}', '${uniqueCats[catName]}')"><i class="fas fa-edit"></i> Edit</button>
                            <button class="btn-sm btn-delete" onclick="bulkDeleteCategory('${catName}')"><i class="fas fa-trash"></i> Delete</button>
                        </div>
                    </div>`;
                grid.appendChild(card);
            });
        }

        function renderSubcategoriesGrid() {
            const grid = document.getElementById("subcategories-grid");
            grid.innerHTML = "";
            const uniqueSubs = {};
            allProducts.filter(p => p.category === currentCategory).forEach(p => {
                if(p.subcategory && !uniqueSubs[p.subcategory]) uniqueSubs[p.subcategory] = p.subcategoryImg || defaultImg;
            });
            const keys = Object.keys(uniqueSubs);
            if(keys.length === 0) { grid.innerHTML = "<p>No subcategories found.</p>"; return; }
            keys.forEach(subName => {
                const card = document.createElement("div");
                card.className = "card-item";
                card.onclick = () => { currentSubcategory = subName; currentView = "products"; renderCurrentView(); };
                card.innerHTML = `
                    <img class="card-img" src="${uniqueSubs[subName]}">
                    <div class="card-content">
                        <div class="card-title"><i class="fas fa-folder-open"></i> ${subName}</div>
                        <div class="action-btns" onclick="event.stopPropagation();">
                            <button class="btn-sm btn-edit" onclick="editSubcategoryDetails('${subName}', '${uniqueSubs[subName]}')"><i class="fas fa-edit"></i> Edit</button>
                            <button class="btn-sm btn-delete" onclick="bulkDeleteSubcategory('${subName}')"><i class="fas fa-trash"></i> Delete</button>
                        </div>
                    </div>`;
                grid.appendChild(card);
            });
        }

        function renderProductsTable() {
            const tbody = document.getElementById("products-table-body");
            tbody.innerHTML = "";
            const products = allProducts.filter(p => p.category === currentCategory && p.subcategory === currentSubcategory);
            if(products.length === 0) { tbody.innerHTML = "<tr><td colspan='6'>No products found.</td></tr>"; return; }
            products.forEach(p => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td><img src="${p.imageUrl || defaultImg}" style="width:50px; height:50px; object-fit:cover; border-radius:4px;"></td>
                    <td><strong>${p.name}</strong></td>
                    <td>${p.length} x ${p.height}</td>
                    <td><span style="color:${p.quantity > 0 ? 'green':'red'}; font-weight:bold;">${p.quantity} Pcs</span></td>
                    <td>₹${p.price}</td>
                    <td>
                        <button class="btn-sm btn-edit" onclick='startProductEdit(${JSON.stringify(p).replace(/'/g, "&apos;")})'><i class="fas fa-edit"></i> Edit</button>
                        <button class="btn-sm btn-delete" onclick="deleteProduct('${p.id}')"><i class="fas fa-trash"></i></button>
                    </td>`;
                tbody.appendChild(tr);
            });
        }

        function editCategoryDetails(oldName, oldImg) {
            const newName = prompt("New Category Name:", oldName); if(newName === null) return;
            const newImg = prompt("New Category Image URL:", oldImg === defaultImg ? "" : oldImg); if(newImg === null) return;
            const batch = db.batch();
            allProducts.filter(p => p.category === oldName).forEach(p => {
                batch.update(db.collection("products").doc(p.id), { category: newName.trim() || oldName, categoryImg: newImg.trim() || oldImg });
            });
            batch.commit();
        }

        function editSubcategoryDetails(oldSubName, oldSubImg) {
            const newSubName = prompt("New Subcategory Name:", oldSubName); if(newSubName === null) return;
            const newSubImg = prompt("New Subcategory Image URL:", oldSubImg === defaultImg ? "" : oldSubImg); if(newSubImg === null) return;
            const batch = db.batch();
            allProducts.filter(p => p.category === currentCategory && p.subcategory === oldSubName).forEach(p => {
                batch.update(db.collection("products").doc(p.id), { subcategory: newSubName.trim() || oldSubName, subcategoryImg: newSubImg.trim() || oldSubImg });
            });
            batch.commit().then(() => { currentView = "categories"; renderCurrentView(); });
        }

        function updateBreadcrumbs() {
            const bc = document.getElementById("admin-breadcrumb");
            let html = `<a onclick="navigateTo('categories')">Root</a>`;
            if (currentCategory) html += ` <span>/</span> <a onclick="navigateTo('subcategories')">${currentCategory}</a>`;
            if (currentSubcategory && currentView === "products") html += ` <span>/</span> <span>${currentSubcategory}</span>`;
            bc.innerHTML = html;
        }

        function navigateTo(target) {
            if (target === 'categories') { currentCategory = ""; currentSubcategory = ""; currentView = "categories"; }
            else if (target === 'subcategories') { currentSubcategory = ""; currentView = "subcategories"; }
            renderCurrentView();
        }

        document.getElementById("admin-product-form").addEventListener("submit", (e) => {
            e.preventDefault();
            const editId = document.getElementById("edit-prod-id").value;
            const productData = {
                category: document.getElementById("prod-category").value.trim(),
                categoryImg: document.getElementById("cat-img").value.trim() || defaultImg,
                subcategory: document.getElementById("prod-subcat").value.trim(),
                subcategoryImg: document.getElementById("subcat-img").value.trim() || defaultImg,
                name: document.getElementById("prod-name").value.trim(),
                price: Number(document.getElementById("prod-price").value),
                length: document.getElementById("prod-length").value.trim() || "N/A",
                height: document.getElementById("prod-height").value.trim() || "N/A",
                quantity: Number(document.getElementById("prod-qty").value) || 0,
                imageUrl: document.getElementById("prod-img").value.trim() || defaultImg
            };
            if (editId) {
                db.collection("products").doc(editId).update(productData).then(() => { alert("Updated!"); resetForm(); });
            } else {
                productData.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                db.collection("products").add(productData).then(() => { alert("Added!"); document.getElementById("admin-product-form").reset(); });
            }
        });

        function startProductEdit(product) {
            document.getElementById("edit-prod-id").value = product.id;
            document.getElementById("prod-category").value = product.category;
            document.getElementById("cat-img").value = product.categoryImg || "";
            document.getElementById("prod-subcat").value = product.subcategory;
            document.getElementById("subcat-img").value = product.subcategoryImg || "";
            document.getElementById("prod-name").value = product.name;
            document.getElementById("prod-price").value = product.price;
            document.getElementById("prod-length").value = product.length;
            document.getElementById("prod-height").value = product.height;
            document.getElementById("prod-qty").value = product.quantity;
            document.getElementById("prod-img").value = product.imageUrl || "";
            document.getElementById("form-title").innerText = "Edit Current Product";
            document.getElementById("save-btn").innerHTML = "<i class='fas fa-save'></i> Apply Updates";
            document.getElementById("cancel-edit-btn").style.display = "block";
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function resetForm() {
            document.getElementById("admin-product-form").reset();
            document.getElementById("edit-prod-id").value = "";
            document.getElementById("form-title").innerText = "Add New Product";
            document.getElementById("save-btn").innerHTML = "<i class='fas fa-plus'></i> Save to Database";
            document.getElementById("cancel-edit-btn").style.display = "none";
        }

        function deleteProduct(id) { if(confirm("Delete item?")) db.collection("products").doc(id).delete(); }
        function bulkDeleteCategory(catName) { if(confirm("Delete category?")) allProducts.filter(p => p.category === catName).forEach(p => db.collection("products").doc(p.id).delete()); }
        function bulkDeleteSubcategory(subName) { if(confirm("Delete subcategory?")) allProducts.filter(p => p.category === currentCategory && p.subcategory === subName).forEach(p => db.collection("products").doc(p.id).delete()); }
    </script>
</body>
</html>
