<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Maurya Enterprises</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f6f9; margin: 0; padding: 20px; }
        .admin-container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2, h3 { color: #333; margin-top: 0; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        .form-group label { font-weight: 600; margin-bottom: 5px; font-size: 14px; }
        .form-group input, .form-group select { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        .submit-btn { background: #ff9900; color: black; font-weight: bold; border: none; padding: 12px; border-radius: 4px; cursor: pointer; font-size: 16px; }
        .submit-btn:hover { background: #e08800; }
        .product-list-table { width: 100%; border-collapse: collapse; margin-top: 30px; }
        .product-list-table th, .product-list-table td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        .product-list-table th { background: #333; color: white; }
        .delete-btn { background: #ff3333; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        .delete-btn:hover { background: #cc0000; }
        .back-home { margin-bottom: 20px; display: inline-block; color: #ff9900; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="admin-container">
        <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Back to Live Website</a>
        <h2><i class="fas fa-user-shield"></i> Maurya Enterprises - Admin Panel</h2>
        <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 25px;">

        <h3>Add New Product</h3>
        <form id="admin-product-form">
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" id="prod-name" placeholder="e.g., Ultratech Cement" required>
            </div>
            <div class="form-group">
                <label>Category Name</label>
                <input type="text" id="prod-category" placeholder="e.g., Building Materials" required>
            </div>
            <div class="form-group">
                <label>Subcategory Name (Optional)</label>
                <input type="text" id="prod-subcat" placeholder="e.g., Cement">
            </div>
            <div class="form-group">
                <label>Price (₹)</label>
                <input type="number" id="prod-price" placeholder="e.g., 450" required>
            </div>
            <div class="form-group">
                <label>Image URL (Optional)</label>
                <input type="url" id="prod-img" placeholder="Paste link or leave blank for placeholder image">
            </div>
            <button type="submit" class="submit-btn"><i class="fas fa-plus"></i> Save Product to Live Store</button>
        </form>

        <h3 style="margin-top: 40px;">Live Stock Management</h3>
        <table class="product-list-table">
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="admin-table-body">
                <!-- डेटाबेस से लाइव प्रोडक्ट्स यहाँ लिस्ट होंगे -->
            </tbody>
        </table>
    </div>

    <!-- Firebase SDK Links for Admin -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <script>
        // यहाँ भी अपना ही Firebase config पेस्ट करें
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Save Data to Firebase
        document.getElementById("admin-product-form").addEventListener("submit", (e) => {
            e.preventDefault();
            
            const name = document.getElementById("prod-name").value;
            const category = document.getElementById("prod-category").value;
            const subcategory = document.getElementById("prod-subcat").value || "General";
            const price = Number(document.getElementById("prod-price").value);
            const imageUrl = document.getElementById("prod-img").value || "https://placehold.co/150";

            db.collection("products").add({
                name: name,
                category: category,
                subcategory: subcategory,
                price: price,
                imageUrl: imageUrl,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                alert("Product Added Success!");
                document.getElementById("admin-product-form").reset();
            }).catch(err => alert("Error: " + err.message));
        });

        // Load & Render Admin Table Rows
        db.collection("products").onSnapshot((snapshot) => {
            const tbody = document.getElementById("admin-table-body");
            tbody.innerHTML = "";
            
            snapshot.forEach((doc) => {
                const data = doc.data();
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td><strong>${data.name}</strong><br><small>${data.subcategory}</small></td>
                    <td>${data.category}</td>
                    <td>₹${data.price}</td>
                    <td><button class="delete-btn" onclick="deleteProduct('${doc.id}')"><i class="fas fa-trash"></i> Delete</button></td>
                `;
                tbody.appendChild(tr);
            });
        });

        // Delete Function
        function deleteProduct(id) {
            if(confirm("Are you sure you want to delete this product?")) {
                db.collection("products").document(id).delete();
            }
        }
    </script>
</body>
</html>
